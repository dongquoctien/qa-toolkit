<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>QA Annotator</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>QA Annotator</h1>
    <span id="mode-chip" class="mode-chip" title="Click Settings to change" aria-label="Active QA mode">—</span>
    <a href="#" id="open-settings">Settings</a>
  </header>

  <section class="row row-profile">
    <label for="profile">Profile</label>
    <select id="profile"></select>
  </section>

  <section class="row row-toggle">
    <button id="toggle" class="primary">Start Inspector</button>
    <button id="quick-capture" class="icon-btn" title="Quick capture — drag a region of the page, then annotate">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 2v14a2 2 0 0 0 2 2h14"/>
        <path d="M18 22V8a2 2 0 0 0-2-2H2"/>
      </svg>
    </button>
  </section>

  <section class="row row-viewport">
    <label for="viewport">Viewport</label>
    <select id="viewport" title="Squeeze the page into a fixed-width column to test mobile/tablet layouts. Modal stays at full size on the right.">
      <option value="0">Native (off)</option>
      <option value="360">360px — iPhone SE</option>
      <option value="414">414px — iPhone 12 Pro</option>
      <option value="768">768px — iPad mini</option>
      <option value="1024">1024px — iPad Pro</option>
      <option value="custom">Custom…</option>
    </select>
    <input id="viewport-custom" type="number" min="200" max="2400" step="1" placeholder="px" hidden />
  </section>

  <section class="row row-stats">
    <span class="count">
      Issues: <strong id="count">0</strong>
      <span id="pin-count" class="pin-summary" hidden></span>
    </span>
    <span class="exports">
      <button id="export-json" title="Export JSON">JSON</button>
      <button id="export-md" title="Export Markdown">MD</button>
      <button id="export-zip" title="Export ZIP (with screenshots)">ZIP</button>
    </span>
  </section>

  <section class="row row-clear">
    <button id="clear" class="danger">Clear all issues</button>
  </section>

  <footer>
    <span class="footer-line" id="active-info"></span>
    <span class="footer-line">Stored in <code>chrome.storage.local</code> · Exports go to your Downloads folder</span>
  </footer>

  <script src="../lib/messages.js"></script>
  <script src="../lib/zip-store.js"></script>
  <script src="../lib/exporter.js"></script>
  <script src="popup.js"></script>
</body>
</html>
