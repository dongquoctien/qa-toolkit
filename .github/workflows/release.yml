name: Release extension

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0). Must match a manifest.json bump committed to the branch this is run from.'
        required: true

permissions:
  contents: write   # gh release create needs to write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building extension v$VERSION"

      - name: Verify version matches manifest
        run: |
          MANIFEST_VERSION="$(node -e "console.log(require('./manifest.json').version)")"
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "✗ manifest.json version ($MANIFEST_VERSION) ≠ tag/input version (${{ steps.version.outputs.version }})"
            echo "Bump manifest.json#version before tagging."
            exit 1
          fi
          echo "✓ manifest.json version matches"

      - name: Package extension
        run: node scripts/package-extension.mjs

      - name: List dist
        run: ls -la dist/

      - name: Upload to release (tag push)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP="dist/qa-annotator-extension-v${{ steps.version.outputs.version }}.zip"
          # If release already exists, just upload (idempotent re-runs).
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release exists — uploading ZIP as asset (overwriting if present)."
            gh release upload "v${{ steps.version.outputs.version }}" "$ZIP" --clobber
          else
            echo "Creating release v${{ steps.version.outputs.version }}."
            gh release create "v${{ steps.version.outputs.version }}" \
              "$ZIP#QA Annotator extension v${{ steps.version.outputs.version }} (load unpacked)" \
              --title "v${{ steps.version.outputs.version }}" \
              --generate-notes
          fi

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: qa-annotator-extension-v${{ steps.version.outputs.version }}
          path: dist/*.zip
          retention-days: 7
