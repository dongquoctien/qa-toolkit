<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>QA Test Runner</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>QA Test Runner</h1>
    <span class="version" title="qa-test-runner version">v0.1.1</span>
  </header>

  <section class="row row-import">
    <label class="field">
      <span>QA report</span>
      <input id="report-file" type="file" accept=".zip,.json,application/zip,application/json" />
    </label>
    <p class="hint">Export from <strong>QA Annotator</strong> popup → JSON or ZIP. ZIP is fine — we read the inner JSON.</p>
  </section>

  <section id="url-block" class="row" hidden>
    <div class="result-header">
      <strong>Issue locations</strong>
      <span class="muted">Click <em>Open & re-check</em> to navigate the active tab.</span>
    </div>
    <ul id="url-list"></ul>
  </section>

  <section class="row row-actions">
    <button id="run-recheck" class="primary" disabled>
      Re-check on this tab
    </button>
  </section>

  <section class="row row-disabled">
    <button class="ghost" disabled title="Coming v0.2.0">Record flow</button>
    <button class="ghost" disabled title="Coming v0.2.0">Run regression suite</button>
  </section>

  <section id="result-block" class="row" hidden>
    <div class="result-header">
      <strong id="result-title">Result</strong>
      <span id="result-summary" class="muted"></span>
    </div>
    <ul id="result-list"></ul>
    <div class="row-actions">
      <button id="export-result" class="ghost" disabled>Export JSON</button>
    </div>
  </section>

  <footer>
    <p class="muted">Companion to <a href="https://github.com/dongquoctien/qa-toolkit/tree/main/extensions/qa-annotator" target="_blank" rel="noopener">QA Annotator</a>. Re-check verifies <code>expected</code> CSS rows on the current tab.</p>
  </footer>

  <script src="../lib/messages.js"></script>
  <script src="../lib/zip-store.js"></script>
  <script src="../lib/property-normalize.js"></script>
  <script src="../lib/issue-recheck.js"></script>
  <script src="popup.js"></script>
</body>
</html>
